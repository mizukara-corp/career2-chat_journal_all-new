<script>
(function() {
    const BASE_LIFF_URL = "https://liff.line.me/2003655505-A1wBRxrO";
    const SL = "952b9432a3";

    const params = new URLSearchParams(window.location.search);

    // 1. JSON (dataパラメータ) の作成
    const dataObj = {
        library: params.get("library") || "awareness-funnel",
        library_detail: params.get("library_detail") || "ad_sns",
        InflowRoute: params.get("InflowRoute") || "汎用流入経路",
        inflow_campaign_name: params.get("inflow_campaign_name") || params.get("utm_campaign") || "test",
        inflow_source: params.get("inflow_source") || params.get("utm_source") || "test",
        inflow_action_type: params.get("inflow_action_type") || "友だち追加",
        media: params.get("media") || "none",
        product: params.get("product") || "none",
        creative: params.get("creative") || "none"
    };

    // 2. ベースURL作成（SL と JSONをセット）
    let finalUrl = `${BASE_LIFF_URL}?sl=${encodeURIComponent(SL)}&data=${encodeURIComponent(JSON.stringify(dataObj))}`;

    // 3. 並列（外出し）パラメータを付与
    const extraKeys = ["uqid", "bid", "media", "product", "target", "creative", "inflow_campaign_name", "inflow_source", "InflowRoute"];
    extraKeys.forEach(key => {
        const val = params.get(key);
        if (val) {
            finalUrl += `&${key}=${encodeURIComponent(val)}`;
        }
    });

    // 4. 即時リダイレクト
    window.location.replace(finalUrl);
})();
</script>
